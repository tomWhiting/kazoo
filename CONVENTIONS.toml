# CONVENTIONS.toml — post-mutation check configuration for Norn.
#
# Each [group] declares, per language or file pattern, which checks run
# after a write / edit / apply_patch mutation, with what code-line limit,
# and whether each finding advises the model or blocks the mutation.
# Generated by `norn init conventions`; edit freely to suit your project.

[rust-general]
# tools: mutation tools that activate this group.
tools = ["write", "edit", "apply_patch"]
# paths: globs matched against the modified file path (workspace-relative).
paths = ["*.rs", "**/*.rs"]
# loc.limit: max code lines (counted by tokei) before the file-length check fires.
# loc.handling: "advise" surfaces a note; "block" fails the mutation.
loc = { limit = 500, handling = "advise" }
# advise_on: adapters whose findings are advisory (non-blocking).
advise_on = ["clippy"]
# block_on: adapters whose findings block the mutation (empty = nothing blocks).
block_on = []
# bypass_detection: scan for lint-silencing constructs; omitted = language default.
# adapters_dir: directory of project-local declarative adapter TOMLs; omitted = none.
# priority: tiebreaker when LOC limits collide on one file (higher wins; default 0).

[rust-entrypoints]
# tools: mutation tools that activate this group.
tools = ["write", "edit", "apply_patch"]
# paths: globs matched against the modified file path (workspace-relative).
paths = ["**/mod.rs", "**/lib.rs", "**/main.rs"]
# loc.limit: max code lines (counted by tokei) before the file-length check fires.
# loc.handling: "advise" surfaces a note; "block" fails the mutation.
loc = { limit = 500, handling = "advise" }
# advise_on: adapters whose findings are advisory (non-blocking).
advise_on = ["clippy"]
# block_on: adapters whose findings block the mutation (empty = nothing blocks).
block_on = []
# bypass_detection: scan for lint-silencing constructs; omitted = language default.
# adapters_dir: directory of project-local declarative adapter TOMLs; omitted = none.
# priority: tiebreaker when LOC limits collide on one file (higher wins; default 0).
priority = 10
